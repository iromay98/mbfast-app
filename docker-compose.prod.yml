# 本番VPS用（常時公開・自動HTTPS）。同ディレクトリの .env を読み込む。
#
#   1) cp .env.production.example .env して値を埋める（DOMAIN/AUTH_SECRET/AutoTuner 等）
#   2) DOMAIN の A レコードを VPS の IP に向ける（80/443 開放）
#   3) 初回:   SEED_ON_START=1 docker compose -f docker-compose.prod.yml up -d --build
#      2回目以降: docker compose -f docker-compose.prod.yml up -d --build
#
# postgres と app はホストに公開しない（インターネットからは Caddy 経由のみ）。
# データ(DB/アップロード)は名前付きボリュームに永続化され、再デプロイで消えない。
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mbfast
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD を .env に設定してください}"
      POSTGRES_DB: mbfast
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mbfast -d mbfast"]
      interval: 5s
      timeout: 5s
      retries: 12
    # ホスト公開なし（内部ネットワークのみ）

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://mbfast:${POSTGRES_PASSWORD}@postgres:5432/mbfast?schema=public"
      AUTH_SECRET: "${AUTH_SECRET:?AUTH_SECRET を .env に設定してください}"
      AUTH_URL: "https://${DOMAIN:?DOMAIN を .env に設定してください}"
      NEXTAUTH_URL: "https://${DOMAIN}"
      STORAGE_DRIVER: "local"
      STORAGE_LOCAL_DIR: "/data/storage"
      MAX_UPLOAD_BYTES: "${MAX_UPLOAD_BYTES:-52428800}"
      NOTIFICATION_DRIVER: "${NOTIFICATION_DRIVER:-console}"
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY:-}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
      VAPID_SUBJECT: "${VAPID_SUBJECT:-mailto:saraya@ns-inc.jp}"
      AUTOTUNER_API_BASE: "${AUTOTUNER_API_BASE:-https://api.autotuner-tool.com/v2/api/v1/master}"
      AUTOTUNER_ID: "${AUTOTUNER_ID:-}"
      AUTOTUNER_API_KEY: "${AUTOTUNER_API_KEY:-}"
      AUTOTUNER_TIMEOUT_MS: "${AUTOTUNER_TIMEOUT_MS:-30000}"
      AUTOTUNER_MAX_RETRIES: "${AUTOTUNER_MAX_RETRIES:-5}"
      SEED_ON_START: "${SEED_ON_START:-0}"
      NODE_ENV: "production"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - storage:/data/storage # アップロード(スレーブ/原本/mod/写真)を永続化
    # ホスト公開なし（Caddy 経由のみ）

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN:?DOMAIN を .env に設定してください}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data # 証明書を永続化
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  storage:
  caddy_data:
  caddy_config:
